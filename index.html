      padding: 0;

    :root {
      --primary-blue: #0054A4;
      --secondary-blue: #00AEEF;
      --dark-navy: #12253A;
      --light-cyan: #e0f3f9;
      --text-dark: #131416;
      --text-light: #4a627a;

      --bg-primary: #f5f7fa;
      --text-primary: #131416;
      --text-secondary: #4a627a;
      --card-bg: rgba(255, 255, 255, 0.98);
      --card-border: #e2edf7;
      --btn-bg: white;
      --btn-border: #cbdcec;
      --btn-text: #0054A4;
      --btn-active: #0054A4;
      --item-bg: #f8fafd;
      --item-hover: #e0f3f9;
      --item-border: #d5e8f0;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      --label-bg: linear-gradient(135deg, rgba(18, 37, 58, 0.96), rgba(12, 25, 45, 0.98));
      --label-border: rgba(255, 215, 150, 0.6);
      --search-bg: white;
      --search-border: #cbdcec;
      --search-text: #131416;
    }

    body.dark {
      --bg-primary: #0f172a;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --card-bg: rgba(18, 37, 58, 0.96);
      --card-border: rgba(71, 85, 105, 0.6);
      --btn-bg: #1a2f47;
      --btn-border: #334155;
      --btn-text: #e2e8f0;
      --btn-active: #00AEEF;
      --item-bg: #1a2f47;
      --item-hover: #224060;
      --item-border: #334155;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      --label-bg: linear-gradient(135deg, rgba(18, 37, 58, 0.96), rgba(12, 25, 45, 0.98));
      --label-border: rgba(251, 191, 36, 0.6);
      --search-bg: #1a2f47;
      --search-border: #334155;
      --search-text: #e2e8f0;
    }

    body {
      font-family: 'century-gothic', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: var(--bg-primary);
      padding: 20px;
      color: var(--text-primary);
      transition: background 0.3s ease, color 0.3s ease;
      letter-spacing: 0.8px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 1.82px;
      color: #0054A4;
      text-transform: uppercase;
    }

    .subhead {
      text-align: center;
      font-size: 0.95rem;
      color: var(--text-secondary);
      margin-bottom: 20px;
      font-weight: 500;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn, .action-btn, .brand-filter {
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      padding: 8px 20px;
      border-radius: 4px;
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--btn-text);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .filter-btn:hover, .brand-filter:hover {
      background: var(--light-cyan);
      border-color: var(--primary-blue);
    }

    .filter-btn.active, .brand-filter.active {
      background: var(--btn-active);
      color: white;
      border-color: var(--btn-active);
    }

    .brand-filter.active[data-brand="Golden Vision"] {
      background: linear-gradient(135deg, #d4a500, #f4d03f);
      color: #131416;
      border-color: #d4a500;
    }

    body.dark .brand-filter.active[data-brand="Golden Vision"] {
      background: linear-gradient(135deg, #d4a500, #f4d03f);
      color: #131416;
      border-color: #d4a500;
    }

    .search-container {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    .search-box {
      background: var(--search-bg);
      border: 1px solid var(--search-border);
      border-radius: 4px;
      padding: 10px 18px;
      width: 300px;
      font-size: 0.9rem;
      color: var(--search-text);
      outline: none;
      transition: all 0.2s;
    }

    .search-box:focus {
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 2px rgba(0, 84, 164, 0.1);
    }

    .search-box::placeholder {
      color: var(--text-secondary);
    }

    .stats {
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 18px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .map-wrapper {
      flex: 3;
      min-width: 260px;
      height: 68vh;
      min-height: 520px;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background: #1a2634;
      border: 1px solid var(--card-border);
      position: relative;
    }

    .legend {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 1000;
      background: transparent;
      border: none;
      padding: 14px 18px;
      border-radius: 4px;
      box-shadow: none;
      backdrop-filter: blur(8px);
      font-size: 0.85rem;
      color: #131416;
    }

    .legend h4 {
      margin: 0 0 10px 0;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #131416;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
      font-weight: 500;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid white;
      flex-shrink: 0;
    }

    .legend-dot.total-vision {
      background-color: #1c6fb0;
    }

    .legend-dot.golden-vision {
      background: linear-gradient(135deg, #d4a500, #f4d03f);
    }

    .map-fullscreen-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      background: var(--btn-active);
      border: 1px solid var(--btn-active);
      padding: 10px 16px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      color: white;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(0, 84, 164, 0.2);
      display: flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .map-fullscreen-btn:hover {
      background: #003a7a;
      border-color: #003a7a;
    }

    .map-wrapper.fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      border-radius: 0;
      margin: 0;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .sidebar {
      flex: 1;
      min-width: 280px;
      background: var(--card-bg);
      backdrop-filter: blur(2px);
      border-radius: 4px;
      padding: 18px 14px;
      box-shadow: var(--shadow);
      overflow-y: auto;
      max-height: 68vh;
      border: 1px solid var(--card-border);
    }

    .sidebar h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 14px;
      padding-left: 10px;
      border-left: 4px solid var(--primary-blue);
      color: #0054A4;
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    body.dark .sidebar h3 {
      color: #00AEEF;
    }

    .location-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .location-item {
      padding: 14px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.75rem;
      border: none;
      counter-increment: location-counter;
      position: relative;
      padding-left: 36px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .location-item:nth-child(even) {
      background: var(--item-hover);
    }

    .location-item:nth-child(odd) {
      background: #f0f7fc;
    }

    body.dark .location-item:nth-child(odd) {
      background: #1a2f47;
    }

    body.dark .location-item:nth-child(even) {
      background: #224060;
    }

    .location-item::before {
      content: counter(location-counter);
      position: absolute;
      left: 8px;
      top: 14px;
      background: #0054A4;
      color: white;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
    }

    body.dark .location-item::before {
      background: #00AEEF;
      color: #0f172a;
    }

    .location-list {
      counter-reset: location-counter;
    }

    .location-item:hover {
      background: var(--item-hover);
      transform: translateX(2px);
    }

    .location-item.active {
      background: var(--primary-blue);
      color: white;
      border-color: var(--primary-blue);
    }

    .location-item.active .location-name,
    .location-item.active .location-address,
    .location-item.active .location-phone {
      color: white;
    }

    .location-item.active .location-website {
      color: #e0f3f9;
    }

    .location-name {
      font-weight: 700;
      font-size: 0.85rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      color: var(--text-primary);
      gap: 8px;
    }

    .location-name-text {
      flex: 1;
    }

    .location-region-badge {
      background: #0054A4;
      color: white;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    body.dark .location-region-badge {
      background: #00AEEF;
      color: #0f172a;
    }

    .location-address {
      font-size: 0.72rem;
      color: var(--text-secondary);
      line-height: 1.3;
    }

    .location-phone {
      font-size: 0.72rem;
      color: var(--text-secondary);
    }

    .location-website {
      font-size: 0.72rem;
      color: #0054A4;
      text-decoration: none;
      word-break: break-all;
    }

    body.dark .location-website {
      color: #00AEEF;
    }

    .region-badge-sm {
      font-size: 0.65rem;
      background: var(--item-border);
      padding: 3px 8px;
      border-radius: 4px;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      font-weight: 600;
    }

    .location-item.active .region-badge-sm {
      background: rgba(255, 255, 255, 0.25);
      color: white;
    }

    .smart-label {
      background: #0054A4;
      backdrop-filter: blur(8px);
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid #0054A4;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0, 84, 164, 0.3);
      pointer-events: auto;
      cursor: pointer;
      transition: all 0.2s ease;
      z-index: 1000;
    }

    .smart-label:hover {
      background: #003d7a;
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(0, 84, 164, 0.4);
    }

    .smart-label strong {
      font-weight: 800;
      color: white;
      margin-right: 3px;
    }
    
    .no-results {
      text-align: center;
      padding: 20px;
      color: var(--text-secondary);
      font-size: 0.8rem;
    }
    
    @media (max-width: 780px) {
      body {
        padding: 10px;
      }
      .map-wrapper {
        height: 50vh;
      }
      .smart-label {
        font-size: 8px;
        padding: 2px 6px;
      }
      .filter-btn, .action-btn {
        padding: 5px 12px;
        font-size: 0.7rem;
      }
      .map-fullscreen-btn {
        padding: 6px 12px;
        font-size: 0.7rem;
        bottom: 12px;
        right: 12px;
      }
      .search-box {
        width: 220px;
        padding: 6px 14px;
        font-size: 0.75rem;
      }
    }
    
    .logo-header {
      text-align: center;
      margin-bottom: 20px;

      max-width: 200px;
      height: auto;
      display: inline-block;
    }

    .attribution {

      color: var(--text-secondary);
      margin-top: 16px;
      font-weight: 500;
      letter-spacing: 0.3px;
      font-family: Courier, monospace;
    }
  </style>
</head>

      { brand: "Golden Vision", name: "Golden Vision Rowland Heights", address: "1015 S Nogales St, Suite 109, Rowland Heights, CA 91748", phone: "626-784-6721", website: "goldenvision2020.com/location/rowland-heights/", lat: 33.9761, lng: -117.9053, region: "socal", city: "Rowland Heights" },

    ];

    let map;
    let currentFilter = 'all';
    let currentBrandFilter = 'all';
    let currentSearchTerm = '';
    let markersLayer = L.layerGroup();
    let labelsLayer = L.layerGroup();
    let labelObjects = [];
    let updateTimeout = null;
    let isMapFullscreen = false;

    function getFilteredLocations() {
      let filtered = locations.filter(loc => currentFilter === 'all' || loc.region === currentFilter);

      // Apply brand filter
      if (currentBrandFilter !== 'all') {
        filtered = filtered.filter(loc => loc.brand === currentBrandFilter);
      }

      // Apply search filter
      if (currentSearchTerm.trim() !== '') {
        const term = currentSearchTerm.toLowerCase().trim();
        filtered = filtered.filter(loc =>
          loc.name.toLowerCase().includes(term) ||
          loc.city.toLowerCase().includes(term) ||
          loc.brand.toLowerCase().includes(term) ||
          loc.address.toLowerCase().includes(term)
        );
      }

      return filtered;
    }

    // Smart label collision avoidance
    function updateLabelPositions() {
      if (!map) return;
      const zoom = map.getZoom();
      const bounds = map.getBounds();
      const mapContainer = map.getContainer();
      const mapWidth = mapContainer.clientWidth;
      const mapHeight = mapContainer.clientHeight;
      
      const visibleLabels = labelObjects.filter(item => bounds.contains(item.latLng));
      if (visibleLabels.length === 0) return;
      
      const baseOffset = Math.max(14, Math.min(34, 22 - (zoom - 5) * 0.9));
      const candidates = [
        { dx: baseOffset, dy: -baseOffset - 6 },
        { dx: -baseOffset, dy: -baseOffset - 6 },
        { dx: baseOffset, dy: baseOffset + 4 },
        { dx: -baseOffset, dy: baseOffset + 4 },
        { dx: 0, dy: -baseOffset - 10 },
        { dx: 0, dy: baseOffset + 6 }
      ];
      
      const itemsWithPos = visibleLabels.map(item => {
        const point = map.latLngToContainerPoint(item.latLng);
        const textLen = item.location.name.length;
        const width = Math.min(140, Math.max(80, textLen * 5.5 + 30));
        return { item, point, selectedOffset: null, width, height: 26 };
      });
      
      const placedRects = [];
      for (let i = 0; i < itemsWithPos.length; i++) {
        const current = itemsWithPos[i];
        let bestCandidate = null;
        let bestOverlap = Infinity;
        
        for (let cand of candidates) {
          const testX = current.point.x + cand.dx;
          const testY = current.point.y + cand.dy;
          const testRect = { x: testX - current.width/2, y: testY - 12, w: current.width, h: 26 };
          if (testRect.x < 5 || testRect.x + testRect.w > mapWidth - 5 || testRect.y < 5 || testRect.y + 26 > mapHeight - 5) continue;
          
          let totalOverlap = 0;
          for (let placed of placedRects) {
            const overlapX = Math.max(0, Math.min(testRect.x + testRect.w, placed.x + placed.w) - Math.max(testRect.x, placed.x));
            const overlapY = Math.max(0, Math.min(testRect.y + testRect.h, placed.y + placed.h) - Math.max(testRect.y, placed.y));
            totalOverlap += overlapX * overlapY;
          }
          if (totalOverlap < bestOverlap) {
            bestOverlap = totalOverlap;
            bestCandidate = { dx: cand.dx, dy: cand.dy, rect: testRect };
          }
        }
        if (bestCandidate) {
          current.selectedOffset = bestCandidate;
          placedRects.push(bestCandidate.rect);
        } else {
          const fallback = { dx: 18, dy: -22, rect: { x: current.point.x + 18 - current.width/2, y: current.point.y - 22 - 12, w: current.width, h: 26 } };
          current.selectedOffset = fallback;
          placedRects.push(fallback.rect);
        }
      }
      
      for (let item of itemsWithPos) {
        if (item.selectedOffset) {
          const newLatLng = map.containerPointToLatLng({ x: item.point.x + item.selectedOffset.dx, y: item.point.y + item.selectedOffset.dy });
          item.item.marker.setLatLng(newLatLng);
        }
      }
    }
    
    function scheduleLabelUpdate() {
      if (updateTimeout) clearTimeout(updateTimeout);
      updateTimeout = setTimeout(() => { if (map) updateLabelPositions(); }, 50);
    }
    
    function createLabelMarker(location, latLng) {
      let shortName = location.name.replace("Total Vision ", "");
      if (shortName.length > 22) shortName = shortName.substring(0, 20) + "…";
      const html = `<div class="smart-label"><strong>👁️</strong> ${shortName}</div>`;
      const icon = L.divIcon({ className: 'floating-label', html: html, iconSize: [null, null], iconAnchor: [0, 0] });
      const marker = L.marker(latLng, { icon: icon, interactive: true, zIndexOffset: 500 });
      marker.on('click', () => {
        map.flyTo([location.lat, location.lng], 13);
        highlightSidebar(locations.indexOf(location));
        findDotMarker(location)?.openPopup();
      });
      return marker;
    }
    
    function findDotMarker(location) {
      let found = null;
      markersLayer.eachLayer(layer => { if (layer.locationRef === location) found = layer; });
      return found;
    }
    
    function createDotMarker(location) {
      const isGoldenVision = location.brand === 'Golden Vision';
      const fillColor = isGoldenVision ? '#d4a500' : '#1c6fb0';
      const dot = L.circleMarker([location.lat, location.lng], {
        radius: 5,
        fillColor: fillColor,
        color: '#fff',
        weight: 1.8,
        fillOpacity: 0.9
      });
      const popupHTML = `<b>${location.name}</b><br><strong>Brand:</strong> ${location.brand}<br><strong>Region:</strong> ${location.region === 'norcal' ? 'NorCal' : 'SoCal'}<br><small>${location.address}</small>`;
      dot.bindPopup(popupHTML);
      dot.on('click', () => map.flyTo([location.lat, location.lng], 13));
      dot.locationRef = location;
      return dot;
    }
    
    function refreshMap() {
      markersLayer.clearLayers();
      labelsLayer.clearLayers();
      labelObjects = [];
      const filtered = getFilteredLocations();
      filtered.forEach(loc => {
        const dot = createDotMarker(loc);
        markersLayer.addLayer(dot);
        const labelMarker = createLabelMarker(loc, L.latLng(loc.lat, loc.lng));
        labelsLayer.addLayer(labelMarker);
        labelObjects.push({ marker: labelMarker, location: loc, latLng: L.latLng(loc.lat, loc.lng) });
      });
      setTimeout(() => updateLabelPositions(), 100);
      renderSidebar(filtered);

      const norcalCount = filtered.filter(l => l.region === 'norcal').length;
      const socalCount = filtered.filter(l => l.region === 'socal').length;
      const tvCount = filtered.filter(l => l.brand === 'Total Vision').length;
      const gvCount = filtered.filter(l => l.brand === 'Golden Vision').length;
      const searchInfo = currentSearchTerm ? ` — Search: "${currentSearchTerm}"` : '';
      const brandInfo = currentBrandFilter !== 'all' ? ` — ${currentBrandFilter}` : '';
      document.getElementById('statsDisplay').innerHTML = `📍 ${filtered.length} locations${brandInfo} (${norcalCount} NorCal, ${socalCount} SoCal)${searchInfo}`;
    }
    
    function renderSidebar(filtered) {
      const container = document.getElementById('locationList');
      container.innerHTML = '';
      document.getElementById('sidebarCount').innerText = `(${filtered.length})`;

      if (filtered.length === 0) {
        const noResults = document.createElement('div');
        noResults.className = 'no-results';
        noResults.innerHTML = '🔍 No locations found<br>Try a different search or filter';
        container.appendChild(noResults);
        return;
      }

      filtered.forEach((loc, idx) => {
        const globalIdx = locations.indexOf(loc);
        const div = document.createElement('div');
        div.className = 'location-item';
        div.setAttribute('data-idx', globalIdx);
        const regionLabel = loc.region === 'norcal' ? 'NorCal' : 'SoCal';
        const address = loc.address.split(',').slice(0, 2).join(',').trim();
        div.innerHTML = `
          <div class="location-name">
            <span class="location-name-text">${loc.name}</span>
            <span class="location-region-badge">${regionLabel}</span>
          </div>
          <div class="location-address">${address}</div>
          <div class="location-phone">${loc.city}, CA | ${loc.phone}</div>
          <a href="https://${loc.website}" class="location-website">${loc.website}</a>
        `;
        div.onclick = () => { map.flyTo([loc.lat, loc.lng], 13); highlightSidebar(globalIdx); findDotMarker(loc)?.openPopup(); };
        container.appendChild(div);
      });
    }
    
    function highlightSidebar(globalIdx) {
      document.querySelectorAll('.location-item').forEach(el => el.classList.remove('active'));
      document.querySelectorAll(`.location-item[data-idx="${globalIdx}"]`).forEach(el => el.classList.add('active'));
    }
    
    function setFilter(region) {
      currentFilter = region;
      refreshMap();
      const view = region === 'norcal' ? [37.6, -121.8] : (region === 'socal' ? [33.8, -117.8] : [36.5, -119.2]);
      map.flyTo(view, region === 'all' ? 6.4 : 7.5);
    }
    
    function handleSearch() {
      const searchInput = document.getElementById('searchInput');
      currentSearchTerm = searchInput.value;
      refreshMap();
      
      // If search yields results and we're in "all" filter, adjust view to show all results
      const filtered = getFilteredLocations();
      if (filtered.length > 0 && currentFilter === 'all') {
        // Optional: fit bounds to show all search results
        const bounds = L.latLngBounds(filtered.map(loc => [loc.lat, loc.lng]));
        if (filtered.length > 1) {
          map.fitBounds(bounds, { padding: [50, 50] });
        } else if (filtered.length === 1) {
          map.flyTo([filtered[0].lat, filtered[0].lng], 12);
        }
      }
    }
    
    function initTheme() {
      const saved = localStorage.getItem('tvTheme');
      if (saved === 'dark') {
        document.body.classList.add('dark');
        document.getElementById('themeToggleBtn').innerHTML = '☀️ Light Mode';
      }
    }
    
    function toggleTheme() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('tvTheme', isDark ? 'dark' : 'light');
      const btn = document.getElementById('themeToggleBtn');
      btn.innerHTML = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
      setTimeout(() => map.invalidateSize(), 100);
    }
    
    function toggleMapFullscreen() {
      const mapWrapper = document.getElementById('mapWrapper');
      if (!isMapFullscreen) {
        mapWrapper.classList.add('fullscreen');
        isMapFullscreen = true;
        document.getElementById('mapFullscreenBtn').innerHTML = '✕ Exit Fullscreen';
      } else {
        mapWrapper.classList.remove('fullscreen');
        isMapFullscreen = false;
        document.getElementById('mapFullscreenBtn').innerHTML = '⛶ Fullscreen Map';
      }
      setTimeout(() => map.invalidateSize(), 100);
    }
    
    function setBrandFilter(brand) {
      currentBrandFilter = brand;
      refreshMap();
    }

    function init() {
      map = L.map('map').setView([36.5, -119.2], 6.4);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap contributors', maxZoom: 18 }).addTo(map);
      markersLayer.addTo(map);
      labelsLayer.addTo(map);
      refreshMap();
      map.on('zoomend', scheduleLabelUpdate);
      map.on('moveend', scheduleLabelUpdate);

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          setFilter(btn.dataset.region);
        });
      });

      document.querySelectorAll('.brand-filter').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.brand-filter').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          setBrandFilter(btn.dataset.brand);
        });
      });

      document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);
      document.getElementById('mapFullscreenBtn').addEventListener('click', toggleMapFullscreen);

      const searchInput = document.getElementById('searchInput');
      searchInput.addEventListener('input', handleSearch);
      searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSearch();
      });

      initTheme();
    }
    
    window.addEventListener('load', init);
  </script>
